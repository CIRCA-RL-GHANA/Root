# ============================================
# Flutter CI/CD Pipeline
# Test → Build Android/iOS/Web
#
# Triggers
# ────────
# • Push/PR to main touching this workflow file
# • repository_dispatch event "flutter-deploy"
#   → sent by CIRCA-RL-GHANA/Flutter-Ready after its tests pass:
#
#     - name: Trigger Root deployment
#       uses: peter-evans/repository-dispatch@v3
#       with:
#         token: ${{ secrets.ROOT_DISPATCH_TOKEN }}   # PAT (repo scope)
#         repository: CIRCA-RL-GHANA/Root
#         event-type: flutter-deploy
#
#   Store ROOT_DISPATCH_TOKEN as a secret in Flutter-Ready.
# • workflow_dispatch — manual trigger from Actions UI
# ============================================
name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/flutter.yml'
  repository_dispatch:
    types: [flutter-deploy]
  workflow_dispatch:

defaults:
  run:
    working-directory: thepg

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  # ---- Analyze & Test ----
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Flutter frontend source (CIRCA-RL-GHANA/Flutter-Ready)
        uses: actions/checkout@v4
        with:
          repository: CIRCA-RL-GHANA/Flutter-Ready
          path: thepg

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: thepg/coverage/
          retention-days: 7

  # ---- Build Android APK + AAB ----
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Flutter frontend source (CIRCA-RL-GHANA/Flutter-Ready)
        uses: actions/checkout@v4
        with:
          repository: CIRCA-RL-GHANA/Flutter-Ready
          path: thepg

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystore/promptgenie-release.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystore/promptgenie-release.jks
          EOF

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} --dart-define=ENVIRONMENT=production

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} --dart-define=ENVIRONMENT=production

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: thepg/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: thepg/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols
          path: thepg/build/debug-info/
          retention-days: 90

  # ---- Build iOS ----
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Flutter frontend source (CIRCA-RL-GHANA/Flutter-Ready)
        uses: actions/checkout@v4
        with:
          repository: CIRCA-RL-GHANA/Flutter-Ready
          path: thepg

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Import provisioning profile
        uses: apple-actions/download-provisioning-profiles@v2
        with:
          bundle-id: com.promptgenie.app
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Build iOS
        run: flutter build ipa --release --obfuscate --split-debug-info=build/debug-info --export-options-plist=ios/ExportOptions.plist --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} --dart-define=ENVIRONMENT=production

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: thepg/build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-symbols
          path: thepg/build/debug-info/
          retention-days: 90

  # ---- Build Web (PWA) + Deploy to Vercel ----
  build-and-deploy-web:
    name: Build PWA + Deploy → Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Flutter frontend source (CIRCA-RL-GHANA/Flutter-Ready)
        uses: actions/checkout@v4
        with:
          repository: CIRCA-RL-GHANA/Flutter-Ready
          path: thepg

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (CanvasKit + offline-first PWA)
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --pwa-strategy offline-first \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://api.genieinprompt.app' }} \
            --dart-define=ENVIRONMENT=production \
            --source-maps

      - name: Verify PWA artefacts
        run: |
          test -f build/web/flutter_service_worker.js || { echo "::error::Service worker missing"; exit 1; }
          test -f build/web/manifest.json             || { echo "::error::manifest.json missing"; exit 1; }
          echo "Build size: $(du -sh build/web/ | cut -f1)"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        run: |
          vercel build/web \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --name=promptgenie-pwa
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke-test Vercel deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' '${{ vars.VERCEL_URL || "https://genieinprompt.app" }}')
          echo "PWA HTTP status: $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "::error::Smoke test failed (HTTP $STATUS)"; exit 1; }

  # ---- Deploy Android to Play Store ----
  deploy-android:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: build-android
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-aab

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.promptgenie.app
          releaseFiles: app-release.aab
          track: internal
          status: completed
          changesNotSentForReview: false

  # ---- Deploy iOS to App Store ----
  deploy-ios:
    name: Deploy to App Store
    runs-on: macos-latest
    needs: build-ios
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: '*.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
