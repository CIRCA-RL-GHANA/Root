# ============================================================
# Build & Push — NestJS backend image → GitHub Container Registry
#
# Runs on every push to main that touches the backend or
# infrastructure files.  The resulting image is then consumed
# by docker-compose.yml so Hostinger's Docker Manager
# (or any docker compose up) can deploy without a build step.
#
# Image published as:
#   ghcr.io/circa-rl-ghana/root/promptgenie-backend:<sha>
#   ghcr.io/circa-rl-ghana/root/promptgenie-backend:latest
# ============================================================
name: Build & Push Backend Image

on:
  push:
    branches: [main]
    paths:
      - 'orionstack-backend--main/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/root/promptgenie-backend

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./orionstack-backend--main
          file: ./orionstack-backend--main/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
