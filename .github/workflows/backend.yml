# ============================================================
# Backend — Test → Build → Push → Deploy
#
# Single authoritative backend CI/CD pipeline.
# Replaces build-and-push.yml (now removed).
#
# Triggers
# ────────
# • Push to main touching infra files in Root
# • repository_dispatch event "backend-deploy"
#   → sent by CIRCA-RL-GHANA/NestJS-Ready after its tests pass:
#
#     - name: Trigger Root deployment
#       uses: peter-evans/repository-dispatch@v3
#       with:
#         token: ${{ secrets.ROOT_DISPATCH_TOKEN }}   # PAT (repo scope)
#         repository: CIRCA-RL-GHANA/Root
#         event-type: backend-deploy
#
#   Store ROOT_DISPATCH_TOKEN as a secret in NestJS-Ready.
# • workflow_dispatch — manual trigger from Actions UI
#
# Images published as:
#   ghcr.io/circa-rl-ghana/root/promptgenie-backend:<sha>
#   ghcr.io/circa-rl-ghana/root/promptgenie-backend:latest
# ============================================================
name: Backend — Test → Build → Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/backend.yml'
  repository_dispatch:
    types: [backend-deploy]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: false
        type: boolean

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/root/promptgenie-backend

jobs:
  # ── 1. Lint & Test ────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: promptgenie_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Checkout NestJS backend source (CIRCA-RL-GHANA/NestJS-Ready)
        uses: actions/checkout@v4
        with:
          repository: CIRCA-RL-GHANA/NestJS-Ready
          path: orionstack-backend--main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: orionstack-backend--main/package-lock.json

      - name: Install dependencies
        working-directory: orionstack-backend--main
        # NestJS-Ready's package-lock.json may lag behind package.json (transitive
        # socket.io / throttler deps were added without regenerating the lock).
        # Use 'npm install' so the runner regenerates the lock on the fly instead
        # of failing with EUSAGE.  When the NestJS-Ready lockfile is committed
        # up-to-date, this can be changed back to 'npm ci'.
        run: npm install

      - name: Lint
        working-directory: orionstack-backend--main
        run: npm run lint

      - name: Type check
        working-directory: orionstack-backend--main
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: orionstack-backend--main
        run: npm run test -- --coverage --forceExit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: promptgenie_test
          DB_SYNCHRONIZE: true
          JWT_SECRET: test-jwt-secret-ci-only
          JWT_REFRESH_SECRET: test-refresh-secret-ci-only
          PIN_ENCRYPTION_KEY: test-pin-key-ci-only
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SENDGRID_API_KEY: SG.test
          EMAIL_FROM: test@test.com
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_PHONE_NUMBER: '+10000000000'

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: orionstack-backend--main/coverage/
          retention-days: 7

  # ── 2. Build Docker image & push to GHCR ─────────────────────────────────────
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout NestJS backend source (CIRCA-RL-GHANA/NestJS-Ready)
        uses: actions/checkout@v4
        with:
          repository: CIRCA-RL-GHANA/NestJS-Ready
          path: orionstack-backend--main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./orionstack-backend--main
          file: ./orionstack-backend--main/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Hostinger VPS ────────────────────────────────────────────────
  deploy:
    name: Deploy → Hostinger VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: read   # needed so GITHUB_TOKEN can pull from GHCR on the VPS

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST || '72.61.17.215' }} >> ~/.ssh/known_hosts

      - name: Rsync infrastructure to VPS
        # Syncs Root repo (nginx conf, docker-compose.yml, .env.example, scripts).
        # The backend source code is not synced — it runs as a pre-built GHCR image.
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='thepg' \
            --exclude='orionstack-backend--main' \
            --exclude='node_modules' \
            --exclude='**/*.log' \
            --exclude='certbot/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=yes" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST || '72.61.17.215' }}:/docker/root/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST || '72.61.17.215' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /docker/root

            echo "=== [0/4] Authenticating to GHCR ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # ── Auto-generate required secrets if not set in .env ──────────
            _fill_secret() {
              local key="$1" len="${2:-32}"
              local current
              current=$(grep -E "^${key}=" .env 2>/dev/null | cut -d'=' -f2- | tr -d '[:space:]' || true)
              if [[ -z "$current" || "$current" == your-* || "$current" == *change-in-production* ]]; then
                local val
                val=$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c "${len}")
                if grep -qE "^${key}=" .env 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${val}|" .env
                else
                  echo "${key}=${val}" >> .env
                fi
                echo "  [env] ${key} auto-generated."
              fi
            }
            _fill_b64_secret() {
              local key="$1"
              local current
              current=$(grep -E "^${key}=" .env 2>/dev/null | cut -d'=' -f2- | tr -d '[:space:]' || true)
              if [[ -z "$current" || "$current" == your-* || "$current" == *change-in-production* ]]; then
                local val
                val=$(openssl rand -base64 64 | tr -d '\n')
                if grep -qE "^${key}=" .env 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${val}|" .env
                else
                  echo "${key}=${val}" >> .env
                fi
                echo "  [env] ${key} auto-generated."
              fi
            }
            if [[ ! -f .env ]]; then
              cp .env.example .env
              echo "  [env] .env created from .env.example."
            fi
            _fill_secret       REDIS_PASSWORD        32
            _fill_secret       DB_PASSWORD           32
            _fill_b64_secret   JWT_SECRET
            _fill_b64_secret   JWT_REFRESH_SECRET
            REDIS_PW=$(grep -E "^REDIS_PASSWORD=" .env | cut -d'=' -f2- | tr -d '[:space:]')
            [[ -n "$REDIS_PW" ]] || { echo "ERROR: REDIS_PASSWORD is empty" >&2; exit 1; }
            echo "=== Secrets OK ==="

            echo "=== [1/4] Pulling latest app image from GHCR ==="
            docker compose -f docker-compose.yml pull app

            echo "=== [2/4] Ensuring DB + Redis are healthy ==="
            docker compose -f docker-compose.yml up -d postgres redis
            sleep 5

            echo "=== [3/4] Running database migrations ==="
            if [ "${{ github.event.inputs.skip_migrations || 'false' }}" != "true" ]; then
              docker compose -f docker-compose.yml run --rm \
                -e NODE_ENV=production \
                --entrypoint "" \
                app sh -c "npm run migration:run:prod"
            else
              echo "Skipping migrations (manually requested)"
            fi

            echo "=== [4/4] Rolling restart ==="
            docker compose -f docker-compose.yml up -d --remove-orphans
            docker image prune -f --filter "until=24h"

            echo "=== Waiting for health (max 120s) ==="
            for i in $(seq 1 24); do
              if docker exec promptgenie-app wget -qO- http://localhost:3000/api/v1/health/live 2>/dev/null | grep -q '"status":"ok"'; then
                echo "✓ Healthy after $((i*5))s"
                break
              fi
              [ $i -lt 24 ] && sleep 5 || { docker compose -f docker-compose.yml logs --tail=60 app; exit 1; }
            done
            echo "✓ Deployment complete"

      - name: API smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            "http://${{ secrets.DEPLOY_HOST || '72.61.17.215' }}/api/v1/health/live" \
            -H "Accept: application/json")
          echo "Health endpoint: HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "::error::API health check failed (HTTP $STATUS)"; exit 1; }

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
