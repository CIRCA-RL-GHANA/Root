# ============================================
# Backend CI/CD Pipeline
# Lint → Test → Deploy NestJS → Hostinger VPS
# No Docker registry needed: code is rsynced to
# the VPS and the image is built there directly.
# ============================================
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'orionstack-backend--main/**'
      - 'docker-compose.prod.yml'
      - 'nginx/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'orionstack-backend--main/**'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: orionstack-backend--main

env:
  NODE_VERSION: '18'

jobs:
  # ---- Lint & Test ----
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: promptgenie_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: orionstack-backend--main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test -- --coverage --forceExit
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: promptgenie_test
          DB_SYNCHRONIZE: true
          JWT_SECRET: test-jwt-secret-ci-only
          JWT_REFRESH_SECRET: test-refresh-secret-ci-only
          PIN_ENCRYPTION_KEY: test-pin-key-ci-only
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SENDGRID_API_KEY: SG.test
          EMAIL_FROM: test@test.com
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_PHONE_NUMBER: '+10000000000'

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: orionstack-backend--main/coverage/
          retention-days: 7

  # ---- Deploy to Hostinger VPS ----
  deploy:
    name: Deploy → Hostinger VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      # ── SSH setup ─────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST || '72.61.17.215' }} >> ~/.ssh/known_hosts

      # ── Sync source to VPS (exclude dev artefacts) ────────────────────────
      - name: Rsync source code to VPS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='thepg' \
            --exclude='node_modules' \
            --exclude='**/dist' \
            --exclude='**/.dart_tool' \
            --exclude='**/*.log' \
            --exclude='certbot/' \
            --exclude='orionstack-backend--main/uploads/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }} -o StrictHostKeyChecking=yes" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST || '72.61.17.215' }}:/opt/promptgenie/

      # ── Build & restart on VPS ─────────────────────────────────────────────
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST || '72.61.17.215' }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/promptgenie

            # ── Ensure required secrets are non-empty in .env ──────────────
            # docker-compose.prod.yml uses ${VAR:?} guards; an empty value
            # causes compose to abort before any container is created.
            _fill_secret() {
              local key="$1" len="${2:-32}"
              local current
              current=$(grep -E "^${key}=" .env 2>/dev/null | cut -d'=' -f2- | tr -d '[:space:]' || true)
              if [[ -z "$current" || "$current" == your-* || "$current" == *change-in-production* ]]; then
                local val
                val=$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c "${len}")
                if grep -qE "^${key}=" .env 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${val}|" .env
                else
                  echo "${key}=${val}" >> .env
                fi
                echo "  [env] ${key} auto-generated."
              fi
            }
            _fill_b64_secret() {
              local key="$1"
              local current
              current=$(grep -E "^${key}=" .env 2>/dev/null | cut -d'=' -f2- | tr -d '[:space:]' || true)
              if [[ -z "$current" || "$current" == your-* || "$current" == *change-in-production* ]]; then
                local val
                val=$(openssl rand -base64 64 | tr -d '\n')
                if grep -qE "^${key}=" .env 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${val}|" .env
                else
                  echo "${key}=${val}" >> .env
                fi
                echo "  [env] ${key} auto-generated."
              fi
            }
            if [[ ! -f .env ]]; then
              cp .env.example .env
              echo "  [env] .env created from .env.example."
            fi
            _fill_secret       REDIS_PASSWORD        32
            _fill_secret       DB_PASSWORD           32
            _fill_b64_secret   JWT_SECRET
            _fill_b64_secret   JWT_REFRESH_SECRET
            REDIS_PW=$(grep -E "^REDIS_PASSWORD=" .env | cut -d'=' -f2- | tr -d '[:space:]')
            if [[ -z "$REDIS_PW" ]]; then
              echo "ERROR: REDIS_PASSWORD is still empty — cannot start redis." >&2
              exit 1
            fi
            echo "=== Secrets OK ==="

            echo "=== [1/4] Pulling latest app image ==="
            docker compose -f docker-compose.prod.yml pull app

            echo "=== [2/4] Ensuring DB + Redis are up ==="
            docker compose -f docker-compose.prod.yml up -d postgres redis

            echo "=== [3/4] Running migrations ==="
            docker compose -f docker-compose.prod.yml run --rm \
              -e NODE_ENV=production \
              --entrypoint "" \
              app sh -c "npm run migration:run"

            echo "=== [4/4] Rolling restart (zero-downtime) ==="
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f --filter "until=24h"

            echo "=== Waiting for health (max 120s) ==="
            for i in $(seq 1 24); do
              if docker exec promptgenie-app wget -qO- http://localhost:3000/api/v1/health 2>/dev/null | grep -q '"status":"ok"'; then
                echo "✓ Healthy after $((i*5))s"
                break
              fi
              [ $i -lt 24 ] && sleep 5 || { docker compose -f docker-compose.prod.yml logs --tail=60 app; exit 1; }
            done
            echo "✓ Deployment complete"

      # ── External smoke test ────────────────────────────────────────────────
      - name: API smoke test
        run: |
          sleep 5
          STATUS=$(curl -sk -o /dev/null -w '%{http_code}' \
            "https://${{ secrets.DEPLOY_HOST || '72.61.17.215' }}/api/v1/health" \
            -H "Accept: application/json")
          echo "Health endpoint: HTTP $STATUS"
          [ "$STATUS" -eq 200 ] || { echo "::error::API health check failed (HTTP $STATUS)"; exit 1; }

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
