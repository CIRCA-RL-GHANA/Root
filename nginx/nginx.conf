# ============================================
# Nginx Configuration - PROMPT Genie Production
# Reverse proxy for API + PWA static hosting
# ============================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-javascript
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/opentype
        font/otf
        image/bmp
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/xml;

    # Security Headers
    map $sent_http_content_type $referrer_policy {
        ~*text/html "strict-origin-when-cross-origin";
    }

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    # Upstream: NestJS Backend
    upstream nestjs_backend {
        server app:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---- HTTP → HTTPS Redirect (domain traffic only) ----
    # The catch-all '_' would intercept the IP-fallback vhost, so we
    # scope this block to the production domain name only.
    server {
        listen 80;
        server_name api.genieinprompt.app;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check endpoint (for load balancers)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- Per-server vhosts loaded from conf.d/ ----
    # Includes:
    #   • conf.d/ip-fallback.conf  – plain HTTP on 72.61.17.215 (always active)
    #   • conf.d/ssl.conf          – HTTPS for api.genieinprompt.app (add after Certbot)
    include /etc/nginx/conf.d/*.conf;
}
