# ============================================================
# IP fallback – serves the API over plain HTTP on the VPS IP
# until a domain is pointed and a TLS certificate is issued.
# Once api.genieinprompt.app resolves to this server and
# Certbot has run, this file can be removed.
# ============================================================

server {
    listen 80;
    server_name 72.61.17.215;

    # ACME challenge (Let's Encrypt bootstrapping via IP is
    # not supported, but keep the block so Certbot doesn't
    # conflict with this vhost when you later add a domain).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health / readiness probe
    location = /health {
        access_log off;
        proxy_pass http://nestjs_backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API proxy (all /api/* traffic forwarded to NestJS)
    location /api/ {
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    90s;
        proxy_send_timeout    90s;
        proxy_connect_timeout 30s;
    }

    # WebSocket / Socket.IO
    location /socket.io/ {
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Catch-all: proxy everything else to the backend
    # (prevents nginx default error pages for unmatched paths)
    location / {
        proxy_pass http://nestjs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    90s;
        proxy_send_timeout    90s;
        proxy_connect_timeout 30s;
    }

    # Block dotfiles
    location ~* /\. {
        deny all;
    }
}
