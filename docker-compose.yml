# ============================================================
# docker-compose.yml — Hostinger Docker Manager entry point
#
# Paste ONE of these URLs into Hostinger → Docker Manager:
#   • GitHub repo  : https://github.com/CIRCA-RL-GHANA/Root
#   • Raw file URL : https://raw.githubusercontent.com/CIRCA-RL-GHANA/Root/main/docker-compose.yml
#
# The backend image is pre-built by CI and stored in GHCR.
# No local build step is required — just set the env vars
# listed below (via Hostinger's "Environment Variables" UI or
# a .env file on the VPS) and hit Deploy.
#
# Required secrets to configure in Hostinger before deploying:
#   DB_PASSWORD         – PostgreSQL password
#   REDIS_PASSWORD      – Redis password
#   JWT_SECRET          – run: openssl rand -base64 64
#   JWT_REFRESH_SECRET  – run: openssl rand -base64 64
# ============================================================
version: '3.8'

services:
  # ── Nginx reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: promptgenie-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (SSL auto-renewal) ─────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: promptgenie-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - promptgenie-network

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: promptgenie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-promptgenie}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-promptgenie}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: promptgenie-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── NestJS Backend (pre-built image from GHCR) ─────────────
  app:
    image: ghcr.io/circa-rl-ghana/root/promptgenie-backend:latest
    container_name: promptgenie-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-promptgenie}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://genieinprompt.app}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@genieinprompt.app}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
      PIN_ENCRYPTION_KEY: ${PIN_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
      - app_ml_models:/app/ml-models
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  app_ml_models:
    driver: local

networks:
  promptgenie-network:
    driver: bridge
