version: '3.8'

configs:
  nginx_main:
    content: |
      worker_processes auto;
      error_log /var/log/nginx/error.log warn;
      pid /var/run/nginx.pid;

      events {
          worker_connections 1024;
          multi_accept on;
          use epoll;
      }

      http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;

          log_format main '$$remote_addr - $$remote_user [$$time_local] '
                          '"$$request" $$status $$body_bytes_sent '
                          '"$$http_referer" "$$http_user_agent" '
                          '$$request_time $$upstream_response_time';
          access_log /var/log/nginx/access.log main;

          sendfile on;
          tcp_nopush on;
          tcp_nodelay on;
          keepalive_timeout 65;
          types_hash_max_size 2048;
          client_max_body_size 20M;

          gzip on;
          gzip_vary on;
          gzip_proxied any;
          gzip_comp_level 6;
          gzip_buffers 16 8k;
          gzip_http_version 1.1;
          gzip_min_length 256;
          gzip_types
              application/json
              application/javascript
              application/xml
              text/css
              text/javascript
              text/plain
              text/xml;

          limit_req_zone $$binary_remote_addr zone=api:10m rate=30r/s;
          limit_req_zone $$binary_remote_addr zone=auth:10m rate=5r/s;
          limit_req_zone $$binary_remote_addr zone=static:10m rate=100r/s;

          upstream nestjs_backend {
              server app:3000 max_fails=3 fail_timeout=30s;
              keepalive 32;
          }

          server {
              listen 80;
              server_name api.genieinprompt.app;

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location /health {
                  access_log off;
                  return 200 'OK';
                  add_header Content-Type text/plain;
              }

              location / {
                  return 301 https://$$host$$request_uri;
              }
          }

          include /etc/nginx/conf.d/*.conf;
      }

  nginx_ip_fallback:
    content: |
      server {
          listen 80;
          server_name ${SERVER_IP:-72.61.17.215};

          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location = /health {
              access_log off;
              proxy_pass http://nestjs_backend/api/v1/health;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
          }

          location /api/ {
              proxy_pass http://nestjs_backend;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host       $$host;
              proxy_set_header X-Real-IP  $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout    90s;
              proxy_send_timeout    90s;
              proxy_connect_timeout 30s;
          }

          location /socket.io/ {
              proxy_pass http://nestjs_backend;
              proxy_http_version 1.1;
              proxy_set_header Upgrade    $$http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host       $$host;
              proxy_set_header X-Real-IP  $$remote_addr;
              proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 86400s;
              proxy_send_timeout 86400s;
          }

          location ~* /\. {
              deny all;
          }
      }

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: promptgenie-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    configs:
      - source: nginx_main
        target: /etc/nginx/nginx.conf
      - source: nginx_ip_fallback
        target: /etc/nginx/conf.d/ip-fallback.conf
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    container_name: promptgenie-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - promptgenie-network

  postgres:
    image: postgres:15-alpine
    container_name: promptgenie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-promptgenie}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-promptgenie}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: promptgenie-redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/circa-rl-ghana/root/promptgenie-backend:latest
    container_name: promptgenie-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-promptgenie}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-30d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://genieinprompt.app}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@genieinprompt.app}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  promptgenie-network:
    driver: bridge
